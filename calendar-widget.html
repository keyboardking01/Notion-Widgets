<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 0;
    margin: 0;
  }
  .widget {
    background: #0a0a0a;
    border-radius: 0;
    padding: 20px;
    width: 100%;
    border: none;
  }
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .cal-month {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #E24B4A;
  }
  .cal-year { font-size: 11px; color: #444; letter-spacing: 0.08em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow {
    font-size: 9px;
    color: #444;
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .cal-day { font-size: 11px; color: #666; text-align: center; padding: 5px 0; border-radius: 4px; }
  .cal-day.today { background: #E24B4A; color: #fff; font-weight: 500; border-radius: 6px; }
  .cal-day.empty { color: transparent; }
</style>
</head>
<body>
<div class="widget">
  <div class="cal-header">
    <div class="cal-month" id="calMonth"></div>
    <div class="cal-year" id="calYear"></div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>
<script>
const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function render() {
  const now = new Date();
  const today = now.getDate();
  const month = now.getMonth();
  const year = now.getFullYear();
  document.getElementById('calMonth').textContent = MONTHS[month];
  document.getElementById('calYear').textContent = year;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    el.textContent = '0';
    grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day' + (d === today ? ' today' : '');
    el.textContent = d;
    grid.appendChild(el);
  }
}
render();
</script>
</body>
</html>
