<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock & Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 0;
    margin: 0;
  }
  .wrap {
    background: #0a0a0a;
    width: 100%;
    border: none;
  }
  .clock-section {
    padding: 24px 24px 20px;
    border-bottom: 0.5px solid #1e1e1e;
  }
  .ampm {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: #E24B4A;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .flip-row {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .flip-card {
    background: #111;
    border-radius: 8px;
    width: 72px;
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .flip-card::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 0.5px;
    background: #0a0a0a;
  }
  .flip-card.small {
    width: 48px;
    height: 58px;
    border-radius: 6px;
  }
  .flip-num {
    font-size: 56px;
    font-weight: 600;
    color: #e8e8e8;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .flip-num.small {
    font-size: 34px;
    color: #555;
  }
  .flip-sep {
    font-size: 48px;
    font-weight: 300;
    color: #333;
    line-height: 1;
    margin-bottom: 4px;
  }
  .flip-sep.small {
    font-size: 28px;
    color: #222;
    margin-bottom: 2px;
  }
  .sec-label {
    font-size: 9px;
    color: #333;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    margin-top: 4px;
  }
  .sec-col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .cal-section { padding: 20px 24px 24px; }
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .cal-month {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #E24B4A;
  }
  .cal-year { font-size: 11px; color: #444; letter-spacing: 0.08em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow {
    font-size: 9px;
    color: #444;
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .cal-day { font-size: 11px; color: #666; text-align: center; padding: 5px 0; border-radius: 4px; }
  .cal-day.today { background: #E24B4A; color: #fff; font-weight: 500; border-radius: 6px; }
  .cal-day.empty { color: transparent; pointer-events: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="clock-section">
    <div class="ampm" id="ampm">AM</div>
    <div class="flip-row">
      <div class="flip-card"><span class="flip-num" id="ch">12</span></div>
      <div class="flip-sep">:</div>
      <div class="flip-card"><span class="flip-num" id="cm">00</span></div>
      <div class="flip-sep small">:</div>
      <div class="sec-col">
        <div class="flip-card small"><span class="flip-num small" id="cs">00</span></div>
        <div class="sec-label">sec</div>
      </div>
    </div>
  </div>

  <div class="cal-section">
    <div class="cal-header">
      <div class="cal-month" id="calMonth"></div>
      <div class="cal-year" id="calYear"></div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('ampm').textContent = ampm;
  document.getElementById('ch').textContent = String(h).padStart(2, '0');
  document.getElementById('cm').textContent = String(m).padStart(2, '0');
  document.getElementById('cs').textContent = String(s).padStart(2, '0');
}

const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCal() {
  const now = new Date();
  const today = now.getDate();
  const month = now.getMonth();
  const year = now.getFullYear();
  document.getElementById('calMonth').textContent = MONTHS[month];
  document.getElementById('calYear').textContent = year;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    el.textContent = '0';
    grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day' + (d === today ? ' today' : '');
    el.textContent = d;
    grid.appendChild(el);
  }
}

updateClock();
renderCal();
setInterval(updateClock, 1000);
</script>
</body>
</html>
