<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Score</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 0;
    margin: 0;
  }
  .widget {
    background: #0a0a0a;
    border-radius: 0;
    padding: 28px 24px 24px;
    width: 100%;
    border: none;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
  }
  .title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: #666;
    text-transform: uppercase;
  }
  .total-score { text-align: right; }
  .total-num {
    font-size: 32px;
    font-weight: 500;
    color: #E24B4A;
    line-height: 1;
  }
  .total-label {
    font-size: 10px;
    color: #555;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .pentagon-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }
  .categories { display: flex; flex-direction: column; gap: 10px; }
  .cat-row { display: flex; align-items: center; gap: 10px; }
  .cat-label {
    font-size: 12px;
    color: #888;
    width: 80px;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }
  .cat-checks { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .check-item { display: flex; align-items: center; gap: 4px; }
  .check-item input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border: 1px solid #333;
    border-radius: 3px;
    background: #111;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .check-item input[type="checkbox"]:checked {
    background: #E24B4A;
    border-color: #E24B4A;
  }
  .check-item input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 1px;
    width: 4px;
    height: 7px;
    border: 1.5px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }
  .check-text { font-size: 10px; color: #555; white-space: nowrap; }
  .cat-pct {
    font-size: 11px;
    font-weight: 500;
    color: #E24B4A;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  .divider { border: none; border-top: 0.5px solid #1e1e1e; margin: 16px 0; }
  .footer { display: flex; justify-content: space-between; align-items: center; }
  .date-str { font-size: 11px; color: #444; letter-spacing: 0.06em; }
  .reset-btn {
    font-size: 10px;
    color: #444;
    background: none;
    border: 0.5px solid #2a2a2a;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { color: #888; border-color: #444; }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="title">Daily Score</div>
    <div class="total-score">
      <div class="total-num" id="totalScore">0</div>
      <div class="total-label">/ 100</div>
    </div>
  </div>
  <div class="pentagon-wrap">
    <svg id="pentagonSvg" width="200" height="200" viewBox="0 0 200 200"></svg>
  </div>
  <div class="categories" id="catList"></div>
  <hr class="divider">
  <div class="footer">
    <div class="date-str" id="dateStr"></div>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
</div>
<script>
const CATEGORIES = [
  { id: 'spiritual', label: 'Spiritual', items: ['Bible', 'Prayer'] },
  { id: 'physical',  label: 'Physical',  items: ['Water', 'Vitamins', 'Move'] },
  { id: 'work',      label: 'Work',      items: ['Core Work', 'Dream Work'] },
  { id: 'relational',label: 'Relational',items: ['Encourage', 'Check in'] },
  { id: 'mental',    label: 'Mental',    items: ['No phone 30m', 'Gratitude', 'Outside', 'Reading'] }
];
const CX = 100, CY = 100, R = 78;
function pentagonPoints(cx, cy, r) {
  return Array.from({length: 5}, (_, i) => {
    const a = (Math.PI * 2 * i / 5) - Math.PI / 2;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  });
}
function pointsToPath(pts) {
  return pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(2) + ',' + p[1].toFixed(2)).join(' ') + ' Z';
}
function drawPentagon(scores) {
  const svg = document.getElementById('pentagonSvg');
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  [0.25, 0.5, 0.75, 1.0].forEach(level => {
    const el = document.createElementNS(ns, 'path');
    el.setAttribute('d', pointsToPath(pentagonPoints(CX, CY, R * level)));
    el.setAttribute('fill', 'none');
    el.setAttribute('stroke', '#222');
    el.setAttribute('stroke-width', '0.5');
    svg.appendChild(el);
  });
  pentagonPoints(CX, CY, R).forEach(pt => {
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', CX); line.setAttribute('y1', CY);
    line.setAttribute('x2', pt[0]); line.setAttribute('y2', pt[1]);
    line.setAttribute('stroke', '#333');
    line.setAttribute('stroke-width', '0.5');
    svg.appendChild(line);
  });
  const outer = pentagonPoints(CX, CY, R);
  const filled = outer.map((pt, i) => {
    const s = scores[i] / 100;
    return [CX + (pt[0] - CX) * s, CY + (pt[1] - CY) * s];
  });
  const fillEl = document.createElementNS(ns, 'path');
  fillEl.setAttribute('d', pointsToPath(filled));
  fillEl.setAttribute('fill', '#E24B4A');
  fillEl.setAttribute('fill-opacity', '0.18');
  fillEl.setAttribute('stroke', '#E24B4A');
  fillEl.setAttribute('stroke-width', '1.5');
  svg.appendChild(fillEl);
  filled.forEach(pt => {
    const dot = document.createElementNS(ns, 'circle');
    dot.setAttribute('cx', pt[0]); dot.setAttribute('cy', pt[1]);
    dot.setAttribute('r', '3');
    dot.setAttribute('fill', '#E24B4A');
    svg.appendChild(dot);
  });
  const labelR = R + 16;
  pentagonPoints(CX, CY, labelR).forEach((pt, i) => {
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', pt[0].toFixed(2));
    t.setAttribute('y', pt[1].toFixed(2));
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    t.setAttribute('font-size', '8');
    t.setAttribute('fill', '#555');
    t.setAttribute('font-family', 'system-ui, sans-serif');
    t.setAttribute('letter-spacing', '0.05em');
    t.textContent = ['SPIRITUAL','PHYSICAL','WORK','RELATIONAL','MENTAL'][i];
    svg.appendChild(t);
  });
}
function getKey() { return 'lifescore_' + new Date().toISOString().slice(0, 10); }
function loadState() { try { return JSON.parse(localStorage.getItem(getKey()) || '{}'); } catch(e) { return {}; } }
function saveState(s) { try { localStorage.setItem(getKey(), JSON.stringify(s)); } catch(e) {} }
function getCatScore(catId, state) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const checked = cat.items.filter(item => state[catId + '_' + item]);
  return Math.round((checked.length / cat.items.length) * 100);
}
function render() {
  const state = loadState();
  const list = document.getElementById('catList');
  list.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const row = document.createElement('div');
    row.className = 'cat-row';
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.textContent = cat.label;
    row.appendChild(lbl);
    const checks = document.createElement('div');
    checks.className = 'cat-checks';
    cat.items.forEach(item => {
      const key = cat.id + '_' + item;
      const wrap = document.createElement('label');
      wrap.className = 'check-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!state[key];
      cb.addEventListener('change', () => {
        const s = loadState(); s[key] = cb.checked; saveState(s); render();
      });
      const txt = document.createElement('span');
      txt.className = 'check-text';
      txt.textContent = item;
      wrap.appendChild(cb); wrap.appendChild(txt);
      checks.appendChild(wrap);
    });
    row.appendChild(checks);
    const pct = document.createElement('div');
    pct.className = 'cat-pct';
    pct.textContent = getCatScore(cat.id, state) + '%';
    row.appendChild(pct);
    list.appendChild(row);
  });
  const scores = CATEGORIES.map(c => getCatScore(c.id, state));
  drawPentagon(scores);
  document.getElementById('totalScore').textContent = Math.round(scores.reduce((a,b) => a+b,0) / scores.length);
  const now = new Date();
  document.getElementById('dateStr').textContent = now.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}).toUpperCase();
}
function resetAll() { try { localStorage.removeItem(getKey()); } catch(e) {} render(); }
render();
</script>
</body>
</html>
